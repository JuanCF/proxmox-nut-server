name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y shellcheck shfmt

      - name: shellcheck
        run: find src/ -name "*.sh" | xargs shellcheck

      - name: shfmt
        run: find src/ -name "*.sh" | xargs shfmt -d -i 2
